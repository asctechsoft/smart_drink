name: smartdrinkai
description: "SmartDrink AI"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  get:
  sqflite: ^2.4.2
  fl_chart: ^0.70.2
  flutter_svg: ^2.2.3
  intl: ^0.20.2
  permission_handler: ^12.0.1
  path_provider: ^2.1.5
  share_plus: ^12.0.1
  fluttertoast: ^9.0.0
  in_app_review: ^2.0.10
  shared_preferences: ^2.3.5
  country_flags: ^3.0.0
  device_region: ^1.1.1
  dsp_base:
    path: ./dsp_base

  firebase_core: any
  audioplayers: ^6.6.0
  confetti: ^0.8.0
dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_test:
    sdk: flutter

  pedantic_mono: any
flutter:
  uses-material-design: true

